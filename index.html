<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Street Fighter game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="assets\css\index.css">

</head>


  <body class="h-100 w-100"> 
    <div id ="main-container">
      <div id="select-p1">
        <h1><img src ="assets\images\Buttons\player1-select.png"></h1>
        <button id="ryuP1"> <img src ="assets\images\main-selector-character\ryu-right.png"> </button>
        <button id="kenP1"> <img src ="assets\images\main-selector-character\ken-right.png"> </button>
        <button id="biankaP1"> <img src ="assets\images\main-selector-character\bianka-right.png"> </button>
        <button id="sagatP1"> <img src ="assets\images\main-selector-character\sagat-right.png"> </button>

      </div>
      
      <div id = "game-container" style ="position:relative" class="h-100 w-100 d-flex align-items-center justify-content-center">
        <button style ="position: absolute" id="startBtn">
          <img src ="assets\images\Buttons\press-start-gif.gif">
        </button>
        <canvas id="streetFighter"></canvas>
        <button id="restartBtn">RESTART GAME</button>
      </div>

      <div id="select-p2">
        <h1><img src ="assets\images\Buttons\player2-select.png"></h1>
        <button id="ryuP2"> <img src ="assets\images\main-selector-character\ryu-left.png"> </button>
        <button id="kenP2"> <img src ="assets\images\main-selector-character\ken-left.png"> </button>
        <button id="biankaP2"> <img src ="assets\images\main-selector-character\bianka-left.png"> </button>
        <button id="sagatP2"> <img src ="assets\images\main-selector-character\sagat-left.png"> </button>
      </div>
    </div>
    
    
    <img id="logo" src="assets\images\backgrounds\spain-figther-logo.png"/>
    
    <script src="assets\js\constants.js"></script>

    <script src="assets\js\models\player.js"></script>
   

    <script src="assets\js\models\enemies.js"></script>
    <script src="assets\js\models\health-icon.js"></script>
    <script src="assets\js\models\kame-icon.js"></script>
    
    <script src="assets\js\models\background.js"></script>
    <script src="assets\js\models\game.js"></script>
    
    <script src ="assets\js\index.js"></script>
  </body>
  
</html>
